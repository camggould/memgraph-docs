# goreleaser config for memgraph-docs. Run `goreleaser release --clean` from
# a maintainer machine with GITHUB_TOKEN set. See https://goreleaser.com.
version: 2

project_name: memgraph-docs

before:
  hooks:
    - go mod tidy

builds:
  - id: memgraph-docs
    main: ./cmd/memgraph-docs
    binary: memgraph-docs
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE
      - README.md
      - DESIGN.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+?\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+?\))??!?:.+$'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: camggould
    name: memgraph-docs
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
